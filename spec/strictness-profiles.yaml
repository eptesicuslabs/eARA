# eARA Strictness Profiles v2.0
# Two profiles replace the original four (minimal/standard/strict/paranoid).
# Normal gets the job done with fewer agents. Ultra forces every agent to
# internalize the full eARA protocol stack before acting.
#
# Profile hierarchy: normal < ultra
# Ultra includes everything from normal plus additions.

profiles:

  # ─── NORMAL ────────────────────────────────────────────────────────
  # For: production work, prototypes, standard engineering tasks
  # Philosophy: "Build, test, verify independently. Keep it lean."
  # When to use: Default for any work. Fewer agents, same discipline.
  # The agent follows eARA protocol with a practical agent complement.

  normal:
    agent_bootstrap:
      files_required:
        - eara.yaml
      files_recommended:
        - spec/program.md
      inject_into_subagents: false    # subagents get task context, not full protocol
    gates:
      build:
        required: true
      test:
        required: true
      lint:
        required: false    # advisory — flagged but not blocking
      spec_compliance:
        required: true
      no_regression:
        required: true
      test_before_ship:
        enabled: true
        required: true
      post_merge_verification:
        enabled: false
    review:
      default_policy: spec_and_quality
      reviewers:
        spec_compliance:
          enabled: true
        code_quality:
          enabled: true
        native_code:
          enabled: false    # not by default; use per_file_overrides
        security:
          enabled: false    # not by default; use per_file_overrides
        calibration:
          enabled: false
      commit_gate:
        enabled: true
        block_on_missing_reviewer: true
        require_all_returned: true
      agent_count_gate:
        enabled: true
        pre_commit_agents: [research, self_critique, smoke_test]
        reviewer_agents: [spec_compliance]
        post_commit_agents: []
      iterative_refinement:
        enabled: true
        max_iterations: 3
      contract_negotiation:
        enabled: false
      evidence_requirements:
        require_quotes: false
        require_line_numbers: false
        require_file_sizes: false
    logging:
      auto_log: true
      log_dispatches: false
      log_review_findings: false
    boundaries:
      scope_gate: false
      cross_project_verification: false
    framing:
      correction_protocol: halt_and_audit
      verify_framing_on_commit: false

  # ─── ULTRA ─────────────────────────────────────────────────────────
  # For: high-stakes, multi-project, compliance-critical, trust-nothing
  # Philosophy: "Every agent reads the protocol. Every claim needs evidence.
  #              Every boundary is enforced. Every verifier is verified."
  # When to use: When agents must not skip eARA files. When the cost of
  #              any undetected error is unacceptable. When discipline
  #              enforcement matters more than speed.
  #
  # The defining property of ultra: every dispatched subagent receives
  # the full eARA protocol stack injected into its prompt. Agents cannot
  # skip what they are forced to read.
  #
  # Addresses every observed failure from the eMCP, eSkill, and eAgent
  # sessions: performative compliance, hallucinated audits, boundary
  # violations, framing anchoring, incremental compliance, and skipped
  # agents.

  ultra:
    agent_bootstrap:
      files_required:
        - eara.yaml
        - spec/program.md
        - spec/rationalizations.yaml
      files_recommended:
        - protocol/review-protocol.md
        - protocol/gate-protocol.md
      inject_into_subagents: true     # every subagent gets the full protocol stack
    gates:
      build:
        required: true
      test:
        required: true
      lint:
        required: true     # required, not advisory
      spec_compliance:
        required: true
      no_regression:
        required: true
      test_before_ship:
        enabled: true
        required: true
      post_merge_verification:
        enabled: true
        required: true
    review:
      default_policy: full
      reviewers:
        spec_compliance:
          enabled: true
        code_quality:
          enabled: true
        native_code:
          enabled: true
        security:
          enabled: true
        calibration:
          enabled: true
          sample_size: 3
      per_file_overrides:
        - pattern: "**/platform/**"
          policy: elevated
          extra_reviewers: [native_code]
          reason: "OS-level API calls require native code expertise."
        - pattern: "**/security/**"
          policy: elevated
          extra_reviewers: [security]
          reason: "Security boundaries require security expertise."
        - pattern: "**/*.test.*"
          policy: reduced
          reason: "Test files get spec review only."
      commit_gate:
        enabled: true
        block_on_missing_reviewer: true
        require_all_returned: true
      agent_count_gate:
        enabled: true
        pre_commit_agents: [research, plan_compliance, self_critique, smoke_test]
        reviewer_agents: [spec_compliance, code_quality]
        post_commit_agents: [analysis, research_grounding, plan_compliance_post, documentation]
      iterative_refinement:
        enabled: true
        max_iterations: 5
      contract_negotiation:
        enabled: true
      evidence_requirements:
        require_quotes: true
        require_line_numbers: true
        require_file_sizes: true
    logging:
      auto_log: true
      log_dispatches: true
      log_review_findings: true
    boundaries:
      scope_gate: true
      cross_project_verification: true
    framing:
      correction_protocol: halt_and_audit
      verify_framing_on_commit: true

# ─── Profile Resolution ──────────────────────────────────────────────
#
# When a user specifies:
#   strictness:
#     profile: normal
#     overrides:
#       review:
#         evidence_requirements:
#           require_quotes: true
#       gates:
#         lint:
#           required: true
#
# The resolution process:
# 1. Load the base profile (normal or ultra)
# 2. Deep-merge the overrides into the base
# 3. Arrays in overrides APPEND to base arrays (not replace)
# 4. Scalars and booleans in overrides REPLACE base values
#
# This allows a normal-mode project to enable specific ultra features
# (e.g., evidence requirements, calibration) without adopting the full
# ultra agent complement. Conversely, an ultra project can reduce
# specific settings if they are not applicable.
