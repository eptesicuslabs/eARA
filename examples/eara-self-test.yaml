# eARA self-test configuration
# Using eARA discipline to verify the eARA implementation itself.

eara_version: "1.0"
project: "eARA framework self-verification"
description: "Validate that the eARA v1.0 formalization is internally consistent, complete, and correct."

strictness: strict
mode: execution

gates:
  build:
    command: "python -c \"import yaml; [yaml.safe_load(open(f)) for f in __import__('glob').glob('spec/*.yaml') + __import__('glob').glob('examples/*.yaml')]\""
    required: true
  test:
    command: "python scripts/self-test.py"
    required: true
  spec_compliance:
    type: subagent
    required: true
  no_regression:
    command: "echo 'no prior state to regress from'"
    required: false
  test_before_ship:
    enabled: true
    required: true
  post_merge_verification:
    enabled: false
  custom_gates:
    - name: schema_validity
      command: "python scripts/validate-examples.py"
      required: true
      description: "All example eara.yaml files validate against the schema structure"
    - name: cross_reference_integrity
      command: "python scripts/check-cross-refs.py"
      required: true
      description: "All document cross-references resolve to existing files"
    - name: completeness
      command: "python scripts/check-completeness.py"
      required: true
      description: "Every session lesson is addressed in spec or protocol"
    - name: rationalizations_count
      command: "python scripts/check-rationalizations.py"
      required: true
      description: "Rationalizations table has exactly 13 entries"

review:
  default_policy: spec_and_quality
  reviewers:
    spec_compliance:
      enabled: true
    code_quality:
      enabled: true
    calibration:
      enabled: true
      sample_size: 3
  evidence_requirements:
    require_quotes: true
    require_line_numbers: true

logging:
  results_file: "results.tsv"
  auto_log: true

source_files:
  - "spec/*.yaml"
  - "protocol/*.md"
  - "examples/*.yaml"
  - "program.md"
