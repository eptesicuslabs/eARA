# eARA adapted for software engineering
# This is NOT a runnable config -- it documents how eARA's concepts
# map to non-ML software development tasks.

# --- Core mapping ---
# train_script  -> source files under modification
# metric        -> build + test gates (pass/fail)
# metric_direction -> "pass" (not lower/higher)
# compute       -> local build system
# results_file  -> build output + test results

# --- The adapted config used for RAMSpeed ---
project: "RAMSpeed algorithmic improvements"
source_files:
  - "src/RAMSpeed/Services/MemoryOptimizer.cs"
  - "src/RAMSpeed/Services/MemoryMonitor.cs"
  - "src/RAMSpeed/Models/Settings.cs"
  - "src/RAMSpeed/Services/StepEffectivenessTracker.cs"  # new

metric: "gates_pass"  # composite: build + tests + spec review
metric_direction: "pass"  # binary, not numeric

gates:
  build_clean: "dotnet build -o /tmp/build exits 0 with 0 errors"
  tests_pass: "dotnet test exits with 0 failures"
  spec_compliant: "independent subagent reviewer confirms implementation matches spec"
  no_regression: "all pre-existing tests continue to pass"
  backward_compatible: "default settings preserve original behavior"

compute: "local"
local:
  build_command: "dotnet build src/RAMSpeed/RAMSpeed.csproj -o /tmp/ramspeed-build"
  test_command: "dotnet test tests/RAMSpeed.Tests/RAMSpeed.Tests.csproj"
  results_file: "docs/superpowers/specs/results.tsv"

state_dir: "docs/superpowers/specs"

# --- When to use the full loop ---
# The loop applies when the CHANGES are unknown and must be discovered.
# Examples where you SHOULD loop:
#
#   metric: "p95_latency_ms"
#   metric_direction: "lower"
#   source_files: ["src/api/handlers.go"]
#   gates:
#     tests_pass: "go test ./..."
#     no_regression: "benchmark shows no throughput decrease"
#   loop: true
#   loop_termination: "p95 < 50ms or 20 experiments"
#
#   metric: "binary_size_mb"
#   metric_direction: "lower"
#   source_files: ["go.mod", "internal/**/*.go"]
#   gates:
#     tests_pass: "go test ./..."
#     functionality_preserved: "integration tests pass"
#   loop: true
#   loop_termination: "size < 10MB or 15 experiments"
#
# Examples where you should NOT loop (use eARA discipline without the loop):
#   - "implement this feature per spec" -> execution, not search
#   - "fix this specific bug" -> diagnosis then fix, not experimentation
#   - "refactor X to use pattern Y" -> known transformation, not search

# --- What is ALWAYS kept regardless of loop/no-loop ---
# 1. Mandatory subagent verification (fresh context, adversarial review)
# 2. Pre-run checks (describe, build, test, commit)
# 3. Binary keep/discard (no "keep with known issues")
# 4. Append-only results.tsv logging
# 5. Rationalizations table (if you think you can skip verification, you can't)
